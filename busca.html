<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Resultados da pesquisa no cardápio da Pinguine Pizzaria">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.jpg" type="image/jpeg">
    <title>Pesquisa – Pinguine Pizzaria</title>
    <style>
        /* ── Page layout ── */
        .busca-hero {
            background: linear-gradient(135deg, var(--cor4) 0%, var(--cor3) 60%, var(--cor9) 100%);
            padding: 2.5rem 1.5rem 2.5rem;
            text-align: center;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .busca-hero::before {
            content: '🍕';
            position: absolute;
            font-size: 6rem;
            opacity: 0.07;
            top: -10px;
            right: 5%;
            pointer-events: none;
        }

        /* ── New search bar inside page ── */
        .busca-search-bar {
            display: flex;
            justify-content: center;
            padding: 0 1rem;
            max-width: 600px;
            width: 100%;
            position: relative;
            z-index: 10;
        }

        .busca-search-bar input {
            flex: 1;
            padding: 0.85rem 1.2rem;
            font-size: 1.05rem;
            border: none;
            border-radius: 10px 0 0 10px;
            outline: none;
            box-shadow: 0 4px 18px rgba(0,0,0,0.25);
            font-family: 'Outfit', Arial, sans-serif;
        }

        .busca-search-bar button {
            padding: 0 1.4rem;
            background: var(--cor8);
            color: white;
            border: none;
            border-radius: 0 10px 10px 0;
            font-size: 1.3rem;
            cursor: pointer;
            box-shadow: 0 4px 18px rgba(0,0,0,0.25);
            transition: background 0.2s ease;
        }

        .busca-search-bar button:hover { background: var(--cor9); }

        /* ── Results section ── */
        #busca-main {
            max-width: 1000px;
            margin: 0 auto;
            padding: 2rem 1.2rem 3rem;
        }

        .busca-count {
            font-size: 0.95rem;
            color: var(--cor4);
            margin-bottom: 1.4rem;
            font-weight: 600;
        }

        .busca-count strong {
            color: var(--cor9);
        }

        /* ── Grid de resultados ── */
        .busca-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.4rem;
        }

        .busca-card {
            background: white;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 0 4px 14px rgba(0,0,0,0.1);
            text-decoration: none;
            color: inherit;
            display: flex;
            flex-direction: column;
            transition: transform 0.22s ease, box-shadow 0.22s ease;
        }

        .busca-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 12px 28px rgba(0,0,0,0.18);
        }

        .busca-card img {
            width: 100%;
            height: 175px;
            object-fit: contain;
            object-position: center;
            background-color: white;
            display: block;
            margin: 0 auto;
        }

        .busca-card-info {
            padding: 0.8rem 1rem 1rem;
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 0.35rem;
        }

        .busca-card-titulo {
            font-family: 'Outfit', Arial, sans-serif;
            font-size: 0.97rem;
            font-weight: 700;
            color: var(--cor4);
            line-height: 1.3;
        }

        .busca-card-preco {
            font-size: 1rem;
            font-weight: 700;
            color: var(--cor9);
            margin-top: auto;
        }

        /* Highlight da busca no título */
        .busca-hl {
            background: rgba(243, 206, 152, 0.55);
            border-radius: 3px;
            padding: 0 2px;
        }

        /* ── Estado vazio ── */
        .busca-empty {
            text-align: center;
            padding: 4rem 1rem;
        }

        .busca-empty-icon {
            font-size: 4.5rem;
            display: block;
            margin-bottom: 1rem;
            animation: sad-bounce 1.6s ease infinite;
        }

        @keyframes sad-bounce {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-10px); }
        }

        .busca-empty h2 {
            font-size: 1.35rem;
            color: var(--cor4);
            font-family: 'Outfit', Arial, sans-serif;
            margin-bottom: 0.5rem;
        }

        .busca-empty p {
            font-size: 0.97rem;
            color: #666;
        }

        .busca-empty a {
            display: inline-block;
            margin-top: 1.4rem;
            padding: 0.7rem 2rem;
            background: var(--cor3);
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: 700;
            font-family: 'Outfit', Arial, sans-serif;
            transition: background 0.2s ease, transform 0.15s ease;
        }

        .busca-empty a:hover {
            background: var(--cor9);
            transform: scale(1.04);
        }
    </style>
</head>
<body>
    <div id="site-header"></div>
    <div id="site-nav"></div>

    <section class="busca-hero">
        <!-- Elementos ocultos usados pelo JS para atualizar título e contagem -->
        <h1 id="busca-titulo-hero" style="display:none"></h1>
        <p class="busca-hero-sub" id="busca-sub-hero" style="display:none"></p>
        <div class="busca-search-bar">
            <input id="busca-input" type="text" placeholder="Pesquisar no cardápio..." autocomplete="off">
            <button id="busca-btn" title="Buscar">🔍</button>
        </div>
    </section>

    <main id="busca-main">
        <p class="busca-count" id="busca-count"></p>
        <div class="busca-grid" id="busca-grid"></div>
    </main>

    <div id="site-footer"></div>
    <script src="components/loader.js"></script>

            { sabor: "suco_melancia",        titulo: "Suco de Melancia Fresh",         preco: "R$ 12,90", imagem: "images/bebidas/bebida12.png" },
            { sabor: "suco_morango",         titulo: "Suco de Morango Fresh",          preco: "R$ 12,90", imagem: "images/bebidas/bebida13.png" },
            { sabor: "suco_abacaxi",         titulo: "Suco de Abacaxi Fresh",          preco: "R$ 12,90", imagem: "images/bebidas/bebida14.png" },
            { sabor: "suco_maracuja",        titulo: "Suco de Maracujá Fresh",         preco: "R$ 12,90", imagem: "images/bebidas/bebida15.png" },
            { sabor: "suco_uva",             titulo: "Suco de Uva Fresh",              preco: "R$ 12,90", imagem: "images/bebidas/bebida16.png" },
            { sabor: "suco_limao",           titulo: "Suco de Limão Fresh",            preco: "R$ 12,90", imagem: "images/bebidas/bebida17.png" },
            { sabor: "suco_tutti_frutti",    titulo: "Suco de Tutti-Frutti Fresh",     preco: "R$ 12,90", imagem: "images/bebidas/bebida18.png" }
        ];

        function normalizar(texto) {
            return texto.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        }

        function destacar(texto, query) {
            if (!query) return texto;
            const regex = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
            return texto.replace(regex, '<mark class="busca-hl">$1</mark>');
        }

        function renderResultados(query) {
            const grid = document.getElementById('busca-grid');
            const count = document.getElementById('busca-count');
            const hero  = document.getElementById('busca-titulo-hero');
            const sub   = document.getElementById('busca-sub-hero');
            const q     = normalizar(query.trim());

            // Atualiza o título da hero com a pesquisa
            if (query.trim()) {
                hero.textContent = `Pesquisa: "${query.trim()}"`;
                document.title = `"${query.trim()}" – Pinguine Pizzaria`;
            }

            const resultados = q
                ? catalogoBusca.filter(item => normalizar(item.titulo).includes(q))
                : [];

            if (!query.trim()) {
                sub.textContent = 'Digite um termo para pesquisar';
                count.innerHTML = '';
                grid.innerHTML = '';
                return;
            }

            sub.textContent = resultados.length
                ? `${resultados.length} produto${resultados.length > 1 ? 's' : ''} encontrado${resultados.length > 1 ? 's' : ''}`
                : 'Nenhum resultado';

            if (!resultados.length) {
                count.innerHTML = '';
                grid.innerHTML = `
                    <div class="busca-empty" style="grid-column: 1/-1">
                        <span class="busca-empty-icon">🐧</span>
                        <h2>Nenhum produto encontrado</h2>
                        <p>Não encontramos nada para <strong>"${query}"</strong>.<br>Tente outro nome ou veja nosso cardápio completo.</p>
                        <a href="cardapio.html">Ver Cardápio Completo</a>
                    </div>`;
                return;
            }

            count.innerHTML = `Mostrando <strong>${resultados.length}</strong> resultado${resultados.length > 1 ? 's' : ''} para "<strong>${query}</strong>"`;

            grid.innerHTML = resultados.map(item => `
                <a href="produto.html?sabor=${item.sabor}" class="busca-card">
                    <img src="${item.imagem}" alt="${item.titulo}">
                    <div class="busca-card-info">
                        <span class="busca-card-titulo">${destacar(item.titulo, query.trim())}</span>
                        <span class="busca-card-preco">${item.preco}</span>
                    </div>
                </a>
            `).join('');
        }

        // ── Inicializa com o parâmetro da URL ──────────────────────────────
        const urlParams = new URLSearchParams(window.location.search);
        const queryInicial = urlParams.get('q') || '';
        const inputBusca = document.getElementById('busca-input');
        const btnBusca   = document.getElementById('busca-btn');

        inputBusca.value = queryInicial;
        renderResultados(queryInicial);

        // ── Nova busca dentro da página ────────────────────────────────────
        function realizarBusca() {
            const novaQuery = inputBusca.value.trim();
            if (!novaQuery) return;
            const url = new URL(window.location.href);
            url.searchParams.set('q', novaQuery);
            history.pushState({}, '', url);
            renderResultados(novaQuery);
        }

        btnBusca.addEventListener('click', realizarBusca);
        inputBusca.addEventListener('keydown', e => { if (e.key === 'Enter') realizarBusca(); });
    </script>
</body>
</html>
