<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Pinguine Pizzaria</title>
</head>
<body>
    <button class="btn-voltar"><a href="https://gamancio-tech.github.io/pinguine_pizzaria/main"><img class = 'icon' src="icons/seta-circulo-esquerda.png" alt=""></a></button>
    <section class="produto">
        <h1>Pizza de Calabresa</h1>
        <img src="images/pizza_calabresa.jpg" alt="Pizza de Calabresa">
        <span class="price">R$ 45,00</span>
        <h2>Descrição</h2>
        <p>Molho de tomate, mussarela, calabresa fatiada, cebola, orégano e azeitonas sobre massa artesanal assada no forno.
        </p>
    </section>
    <section class="adicionar">
        <button class="btn-adicionar btn-grande">Adicionar ao Carrinho</button>
        <button class="btn-adicionar">0</button>
        <button class="btn-adicionar">-</button>
        <button class="btn-adicionar">+</button>
    </section>
</body>
</html>
