<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.jpg" type="image/jpeg">
    <title>Pinguine Pizzaria</title>
</head>
<body>
    <section class="header">
        <button class="btn-voltar" onclick="if(document.referrer) { window.history.back(); } else { window.location.href = 'main.html'; }"><a href="javascript:void(0)"><img class="icon" src="icons/seta-circulo-esquerda.png" alt="Voltar"></a></button>
        <img class="logo logo-produto" src="images/logo.jpg" alt="Logo da Pinguine Pizzaria">
    </section>
    <section class="produto">
        <img id="prod-img" src="" alt="Imagem do Produto">
        <h1 id="prod-titulo">Carregando...</h1>
        <span id="prod-preco" class="price">R$ 0,00</span>
        
        <h2>Descrição:</h2>
        <p id="prod-descricao">Carregando descrição...</p>
        
        <section class='observacao'>
            <h2>Observação:</h2>
            <input id="prod-observacao" type="text" placeholder="Ex: sem cebola, bem assada...">
        </section>
    </section>

    <section class="adicionar">
        <button id="btn-adicionar-carrinho" type="submit" class="btn-adicionar btn-grande">Adicionar ao Carrinho</button>
        <button id="qntd-valor" class="btn-adicionar btn-qntd">1</button>
        <button id="btn-menos" class="btn-adicionar">-</button>
        <button id="btn-mais" class="btn-adicionar">+</button>
    </section>
    <script src="script_produto.js"></script>
</body>
</html>
