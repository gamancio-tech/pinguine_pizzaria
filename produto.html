<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/logo.jpg" type="image/jpeg">
    <title>Pinguine Pizzaria</title>
</head>
<body>
    <section class="header">
        <button class="btn-voltar"><a href="menu_pizza.html"><img class = 'icon' src="icons/seta-circulo-esquerda.png" alt=""></a></button>
        <img class="logo logo-produto" src="images/logo.jpg" alt="Logo da Pinguine Pizzaria">
    </section>
    <section class="produto">
        <img src="images/pizza_calabresa.jpg" alt="Pizza de Calabresa">
        <h1>Pizza de Calabresa</h1>
        <span class="price">R$ 45,00</span>
        <h2>Descrição:</h2>
        <p>Molho de tomate, mussarela, calabresa fatiada, cebola, orégano e azeitonas sobre massa artesanal assada no forno.
        </p>
        <section class = 'observacao'>
            <h2>Observação:</h2>
            <insert type="text" placeholder="Observação...">Ex: sem cebola, ...</insert>
        </section>
    </section>
    <section class="adicionar">
        <button type="submit" class="btn-adicionar btn-grande">Adicionar ao Carrinho</button>
        <button class="btn-adicionar btn-qntd">0</button>
        <button class="btn-adicionar">-</button>
        <button class="btn-adicionar">+</button>
    </section>
</body>
</html>
