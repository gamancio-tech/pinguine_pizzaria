<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.jpg" type="image/jpeg">
    <title>Pinguine - Meu Perfil</title>
</head>

<body class="perfil-body">

    <div class="perfil-page">
        <!-- Header Bar -->
        <div class="perfil-header-bar">
            <a href="javascript:void(0)"
                onclick="if(document.referrer) { window.history.back(); } else { window.location.href='main.html'; }">&larr;</a>
            <h1>Meu Perfil</h1>
        </div>

        <div class="perfil-content-layout">
            <!-- Sidebar (Colunas da Esquerda) -->
            <div class="perfil-sidebar">
                <div class="perfil-card sidebar-card">
                    <!-- Avatar selection -->
                    <div class="avatar-area">
                        <div class="avatar-preview" id="avatar-preview-box">U</div>
                        <h3 id="sidebar-nome" class="sidebar-user-name">Carregando...</h3>
                        <input type="file" id="avatar-input" accept="image/*" style="display:none;">
                        <div style="display:flex; gap:0.75rem; flex-wrap:wrap; justify-content:center; width:100%;">
                            <button class="avatar-upload-btn" style="min-width: 135px;"
                                onclick="document.getElementById('avatar-input').click()">Alterar Foto</button>
                            <button class="avatar-upload-btn" type="button" onclick="removerAvatar()">Remover
                                Foto</button>
                        </div>
                    </div>

                    <hr class="sidebar-divider">

                    <button class="btn-logout" onclick="fazerLogout()">Sair da Conta</button>
                </div>
            </div>

            <!-- Main Content (Colunas da Direita) -->
            <div class="perfil-main">
                <!-- Menu de Abas (Tabs) -->
                <div class="perfil-tabs">
                    <button class="perfil-tab-btn active" onclick="switchTab('dados', event)">Dados Pessoais</button>
                    <button class="perfil-tab-btn" onclick="switchTab('pedidos', event)">Pedidos em Andamento</button>
                </div>

                <!-- Profile Settings Card -->
                <div class="perfil-card tab-content active" id="tab-dados">
                    <h2>Configurações da Conta</h2>

                    <!-- Profile form -->
                    <div class="perfil-form">
                        <div>
                            <label for="perfil-nome">Nome completo</label>
                            <input type="text" id="perfil-nome" placeholder="Seu nome">
                        </div>
                        <div>
                            <label for="perfil-email">E-mail</label>
                            <input type="email" id="perfil-email" placeholder="seu@email.com">
                        </div>
                        <div>
                            <label for="perfil-telefone">Telefone / WhatsApp</label>
                            <input type="tel" id="perfil-telefone" placeholder="(16) 99999-9999">
                        </div>
                        <div>
                            <label for="perfil-cpf">CPF</label>
                            <input type="text" id="perfil-cpf" placeholder="000.000.000-00">
                        </div>
                        <div class="full-width">
                            <label for="perfil-endereco">Endereço de entrega</label>
                            <input type="text" id="perfil-endereco" placeholder="Rua, Número">
                        </div>
                        <div>
                            <label for="perfil-bairro">Bairro</label>
                            <input type="text" id="perfil-bairro" placeholder="Bairro">
                        </div>
                        <div>
                            <label for="perfil-cidade">Cidade / Estado</label>
                            <input type="text" id="perfil-cidade" placeholder="São Paulo, SP">
                        </div>
                        <div class="full-width">
                            <label for="perfil-complemento">Complemento</label>
                            <input type="text" id="perfil-complemento" placeholder="Apartamento, bloco, referência...">
                        </div>
                    </div>

                    <div class="perfil-actions-right">
                        <button class="btn-salvar-perfil" onclick="salvarPerfil()">Salvar Alterações</button>
                    </div>
                </div>

                <!-- Active Orders Card -->
                <div class="perfil-card tab-content" id="tab-pedidos">
                    <h2>Pedidos em Andamento</h2>
                    <div class="pedidos-lista" id="pedidos-lista">
                        <!-- Populated by JS -->
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Durations (in ms)
        const FASE_PREPARO_MS = 3 * 60 * 1000;  // 3 minutes
        const FASE_ENTREGA_MS = 3 * 60 * 1000;  // 3 more minutes
        const TOTAL_MS = FASE_PREPARO_MS + FASE_ENTREGA_MS;

        // =====================
        // Guard: redirect if not logged in
        // =====================
        if (localStorage.getItem('userLoggedIn') !== 'true') {
            window.location.href = 'login.html';
        }

        // =====================
        // Load Profile Data
        // =====================
        const profile = JSON.parse(localStorage.getItem('userProfile') || '{}');

        function loadProfile() {
            document.getElementById('perfil-nome').value = profile.nome || '';
            document.getElementById('perfil-email').value = profile.email || '';
            document.getElementById('perfil-telefone').value = profile.telefone || '';
            document.getElementById('perfil-cpf').value = profile.cpf || '';
            document.getElementById('perfil-endereco').value = profile.endereco || '';
            document.getElementById('perfil-bairro').value = profile.bairro || '';
            document.getElementById('perfil-cidade').value = profile.cidade || '';
            document.getElementById('perfil-complemento').value = profile.complemento || '';

            const sidebarNome = document.getElementById('sidebar-nome');
            if (sidebarNome) {
                sidebarNome.textContent = profile.nome || 'Seu Nome';
            }

            updateAvatarPreview(profile);
        }

        function updateAvatarPreview(prof) {
            const box = document.getElementById('avatar-preview-box');
            if (prof.avatar) {
                box.innerHTML = `<img src="${prof.avatar}" alt="Avatar">`;
            } else {
                box.textContent = (prof.nome || prof.email || 'U').charAt(0).toUpperCase();
            }
        }

        // Handle avatar file upload
        document.getElementById('avatar-input').addEventListener('change', function () {
            const file = this.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function (e) {
                profile.avatar = e.target.result;
                updateAvatarPreview(profile);
            };
            reader.readAsDataURL(file);
        });

        function removerAvatar() {
            profile.avatar = '';
            localStorage.setItem('userProfile', JSON.stringify(profile));
            updateAvatarPreview(profile);
        }

        function salvarPerfil() {
            profile.nome = document.getElementById('perfil-nome').value.trim();
            profile.email = document.getElementById('perfil-email').value.trim();
            profile.telefone = document.getElementById('perfil-telefone').value.trim();
            profile.cpf = document.getElementById('perfil-cpf').value.trim();
            profile.endereco = document.getElementById('perfil-endereco').value.trim();
            profile.bairro = document.getElementById('perfil-bairro').value.trim();
            profile.cidade = document.getElementById('perfil-cidade').value.trim();
            profile.complemento = document.getElementById('perfil-complemento').value.trim();

            localStorage.setItem('userProfile', JSON.stringify(profile));

            const sidebarNome = document.getElementById('sidebar-nome');
            if (sidebarNome) {
                sidebarNome.textContent = profile.nome || 'Seu Nome';
            }

            const btn = document.querySelector('.btn-salvar-perfil');
            btn.textContent = 'Salvo!';
            btn.style.backgroundColor = 'var(--cor2)';
            setTimeout(() => {
                btn.textContent = 'Salvar Alterações';
                btn.style.backgroundColor = '';
            }, 2000);
        }

        function fazerLogout() {
            localStorage.removeItem('userLoggedIn');
            window.location.href = 'main.html';
        }

        function switchTab(tabId, event) {
            document.querySelectorAll('.perfil-tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            document.querySelectorAll('.tab-content').forEach(content => {
                content.classList.remove('active');
            });

            event.currentTarget.classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
        }

        // =====================
        // Active Orders Tracker
        // =====================
        function renderPedidos() {
            const lista = document.getElementById('pedidos-lista');
            let orders = JSON.parse(localStorage.getItem('activeOrders') || '[]');
            const now = Date.now();

            // Remove orders past the delivery phase
            orders = orders.filter(o => (now - o.timestamp) < TOTAL_MS);
            localStorage.setItem('activeOrders', JSON.stringify(orders));

            if (orders.length === 0) {
                lista.innerHTML = '<p class="pedidos-vazios">🍕 Nenhum pedido em andamento no momento.</p>';
                return;
            }

            lista.innerHTML = orders.map((order, idx) => {
                const elapsed = now - order.timestamp;
                const isFaseEntrega = elapsed >= FASE_PREPARO_MS;
                const statusLabel = isFaseEntrega ? 'Saiu para Entrega 🏍️' : 'Em Preparo 🍳';
                const statusClass = isFaseEntrega ? 'status-entrega' : 'status-preparo';

                // Progress within current phase
                const faseElapsed = isFaseEntrega ? (elapsed - FASE_PREPARO_MS) : elapsed;
                const faseTotal = FASE_PREPARO_MS;
                const progress = Math.min(100, (faseElapsed / faseTotal) * 100);

                // Countdown to next stage or finish
                const nextStageMs = isFaseEntrega
                    ? TOTAL_MS - elapsed
                    : FASE_PREPARO_MS - elapsed;
                const nextSecs = Math.ceil(nextStageMs / 1000);
                const mins = Math.floor(nextSecs / 60);
                const secs = nextSecs % 60;
                const countdownLabel = isFaseEntrega
                    ? `Entrega em: ${mins}m ${secs}s`
                    : `Entrega em preparo: ${mins}m ${secs}s`;

                // Build item summary with promotion sub-items if present
                const itemsSummary = order.itens.map(i => {
                    let desc = `${i.quantidade}x ${i.titulo}`;
                    if (i.tipo === 'combo' && i.itens_selecionados) {
                        const comboItens = i.itens_selecionados.map(si => si.titulo).concat(i.itens_fixos ? i.itens_fixos.map(fi => fi.titulo) : []).join(', ');
                        desc += ` (${comboItens})`;
                    }
                    return desc;
                }).join(', ');
                const totalPedido = order.total || '—';

                return `
                    <div class="pedido-card" id="pedido-${idx}" onclick="abrirModalPedido(${idx})" title="Clique para ver os itens deste pedido">
                        <div class="pedido-card-header">
                            <h3>🧾 Pedido #${idx + 1} &nbsp; <small style="font-weight:400; font-size:0.85rem; color:#888;">${totalPedido}</small></h3>
                            <span class="pedido-status-badge ${statusClass}">${statusLabel}</span>
                        </div>
                        <div class="pedido-itens-resumo">${itemsSummary}</div>
                        <div class="progress-bar-container">
                            <div class="progress-bar-fill" style="width:${progress.toFixed(1)}%"></div>
                        </div>
                        <div class="pedido-countdown">${countdownLabel}</div>
                    </div>
                `;
            }).join('');
        }

        // =====================
        // Modal de Visualização do Pedido
        // =====================
        function abrirModalPedido(idx) {
            const orders = JSON.parse(localStorage.getItem('activeOrders') || '[]');
            const order = orders[idx];
            if (!order) return;

            const modal = document.getElementById('modal-ver-pedido');
            const grid = document.getElementById('modal-ver-pedido-grid');
            const titulo = document.getElementById('modal-ver-pedido-titulo');
            const totalSpan = document.getElementById('modal-ver-pedido-total');

            titulo.textContent = `Detalhes do Pedido #${idx + 1}`;
            totalSpan.textContent = order.total || 'R$ 0,00';

            grid.innerHTML = order.itens.map(item => {
                const imagem = item.imagem || 'images/logo.jpg';
                let subItensList = '';
                if (item.tipo === 'combo' && item.itens_selecionados) {
                    const allComboItens = item.itens_selecionados.map(si => si.titulo).concat(item.itens_fixos ? item.itens_fixos.map(fi => fi.titulo) : []);
                    subItensList = `
                        <div style="font-size: 0.8rem; text-align: left; margin-top: 0.6rem; padding: 0.45rem; background: #fdfaf4; border: 1px dashed #e6c8a0; border-radius: 0.5rem; width: 100%; box-sizing: border-box;">
                            <strong style="color: var(--cor4); display: block; margin-bottom: 0.2rem;">Combo contém:</strong>
                            <ul style="margin: 0; padding-left: 1.1rem; color: #555; line-height: 1.3;">
                                ${allComboItens.map(name => `<li>${name}</li>`).join('')}
                            </ul>
                        </div>
                    `;
                }
                return `
                    <div class="modal-item modal-item-readonly" style="flex-direction: column; align-items: center; justify-content: flex-start; min-height: 180px;">
                        <img src="${imagem}" alt="${item.titulo}" onerror="this.src='images/logo.jpg'">
                        <div class="modal-item-info" style="width: 100%;">
                            <h4 style="font-weight: 700; margin-bottom: 0.4rem; color: var(--cor4);">${item.titulo}</h4>
                            <span class="modal-contador" style="background-color: var(--cor9); color: white; display: inline-block; padding: 0.15rem 0.6rem; font-size: 0.8rem;">Qtd: ${item.quantidade}</span>
                            <div class="modal-item-preco" style="margin-top: 0.5rem; font-size: 0.9rem;">${item.preco || ''}</div>
                            ${subItensList}
                        </div>
                    </div>
                `;
            }).join('');

            modal.style.display = 'flex';
            setTimeout(() => {
                modal.classList.add('modal-ativo');
            }, 10);
        }

        function fecharModalPedido() {
            const modal = document.getElementById('modal-ver-pedido');
            modal.classList.remove('modal-ativo');
            setTimeout(() => {
                modal.style.display = 'none';
            }, 350);
        }

        // Fecha o modal ao clicar fora da área dele
        window.addEventListener('click', (e) => {
            const modal = document.getElementById('modal-ver-pedido');
            if (e.target === modal) {
                fecharModalPedido();
            }
        });

        // Re-render every second
        loadProfile();
        renderPedidos();
        setInterval(renderPedidos, 1000);
    </script>

    <!-- Modal de Visualização do Pedido (Mini Cardápio do Pedido) -->
    <div id="modal-ver-pedido" class="modal-overlay modal-centered" style="display:none;">
        <div class="modal-container">
            <div class="modal-header">
                <h2 id="modal-ver-pedido-titulo">Itens do Pedido</h2>
                <button id="modal-ver-pedido-fechar" class="modal-btn-fechar" type="button" aria-label="Fechar" onclick="fecharModalPedido()">X</button>
            </div>
            <div id="modal-ver-pedido-grid" class="modal-grid">
                <!-- Renderizado via JS -->
            </div>
            <div class="modal-footer" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="font-size: 1.25rem; font-weight: 800; color: var(--cor4);">
                    Total: <span id="modal-ver-pedido-total" style="color: var(--cor8);">R$ 0,00</span>
                </div>
                <button class="avatar-upload-btn" style="min-width: 100px; margin: 0; background-color: var(--cor9); color: white;" type="button" onclick="fecharModalPedido()">Fechar</button>
            </div>
        </div>
    </div>
</body>
</html>
