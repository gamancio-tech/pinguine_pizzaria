<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="icon" href="images/logo.jpg" type="image/jpeg">
    <title>Pinguine Pizzaria - Monte seu Iceberg</title>
</head>
<body>
    <section class="header">
        <button class="btn-voltar"><a href="menu_sobremesa.html"><img class='icon' src="icons/seta-circulo-esquerda.png" alt="Voltar"></a></button>
        <img class="logo logo-produto" src="images/logo.jpg" alt="Logo da Pinguine Pizzaria">
    </section>

    <main id="monte-iceberg" class="configurador-container">
        <section class="configurador-preview">
            <div class="preview-box">
                <img src="images/cardapio_img.jpeg" alt="Sua Pizza de Sorvete" id="pizza-preview">
                <h1>Monte seu Iceberg</h1>
                <span class="price-destaque">R$ 75,00</span>
            </div>
        </section>
        <section class="configurador-opcoes">
            <form id="iceberg-form">
                
                <div class="passo-grupo">
                    <span class="passo-indicador">Passo 1</span>
                    <h2>Escolha a Base da Massa</h2>
                    <div class="opcoes-flex">
                        <label class="opcao-card">
                            <input type="radio" name="massa" value="tradicional" checked>
                            <span class="opcao-detalhe">Massa Tradicional Pan</span>
                        </label>
                        <label class="opcao-card">
                            <input type="radio" name="massa" value="cacau">
                            <span class="opcao-detalhe">Massa de Cacau Black</span>
                        </label>
                    </div>
                </div>

                <div class="passo-grupo">
                    <span class="passo-indicador">Passo 2</span>
                    <h2>Escolha o Sabor do Sorvete (Até 2 sabores)</h2>
                    <p id="aviso-sorvete" style="display:none; color:var(--color-cta-dark); font-size:0.9rem; margin-bottom:0.5rem; font-weight:600;">⚠️ Máximo de 2 sabores permitidos.</p>
                    <div class="opcoes-flex grid-2-col">
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="sorvete" value="creme">
                            <span class="opcao-detalhe">Creme de Baunilha</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="sorvete" value="chocolate">
                            <span class="opcao-detalhe">Chocolate Belga</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="sorvete" value="morango">
                            <span class="opcao-detalhe">Napolitano</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="sorvete" value="flocos">
                            <span class="opcao-detalhe">Chocolate Branco</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="sorvete" value="flocos">
                            <span class="opcao-detalhe">Ninho</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="sorvete" value="flocos">
                            <span class="opcao-detalhe">Frutas Vermelhas</span>
                        </label>
                    </div>
                </div>

                <div class="passo-grupo">
                    <span class="passo-indicador">Passo 3</span>
                    <h2>Adicione os Toppings (Opcional)</h2>
                    <div class="opcoes-flex grid-2-col">
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="oreo">
                            <span class="opcao-detalhe">Biscoito Oreo</span>
                            <span class="opcao-preco-badge acrescimo">+ R$ 4,00</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="choco-ball">
                            <span class="opcao-detalhe">Choco Ball</span>
                            <span class="opcao-preco-badge acrescimo">+ R$ 2,00</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="ovomaltine">
                            <span class="opcao-detalhe">Ovomaltine</span>
                            <span class="opcao-preco-badge acrescimo">+ R$ 4,00</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="marshmallow-tostado">
                            <span class="opcao-detalhe">Marshmallow Tostado</span>
                            <span class="opcao-preco-badge acrescimo">+ R$ 3,00</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="mms">
                            <span class="opcao-detalhe">M&M's Coloridos</span>
                            <span class="opcao-preco-badge acrescimo">+ R$ 3,00</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="pinguine-chocolate">
                            <span class="opcao-detalhe">Pinguine de chocolate</span>
                            <span class="opcao-preco-badge normal">grátis</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="calda-chocolate">
                            <span class="opcao-detalhe">Calda de Chocolate</span>
                            <span class="opcao-preco-badge normal">grátis</span>
                        </label>
                        <label class="opcao-card checkbox-card">
                            <input type="checkbox" name="toppings" value="calda-morango">
                            <span class="opcao-detalhe">Calda de morango</span>
                            <span class="opcao-preco-badge normal">grátis</span>
                        </label>
                    </div>
                </div>

                <div class="acao-final">
                    <button type="submit" class="btn-adicionar btn-grande">Adicionar Minha Criação ao Carrinho</button>
                </div>

            </form>
        </section>
    </main>

    <script>
        const icebergForm = document.getElementById('iceberg-form');
        const defaultImage = 'images/cardapio_img.jpeg';

        // Enforce max 2 ice cream flavors
        const sorveteCheckboxes = document.querySelectorAll('input[name="sorvete"]');
        sorveteCheckboxes.forEach(cb => {
            cb.addEventListener('change', () => {
                const checked = document.querySelectorAll('input[name="sorvete"]:checked');
                if (checked.length > 2) {
                    cb.checked = false;
                    const aviso = document.getElementById('aviso-sorvete');
                    aviso.style.display = 'block';
                    setTimeout(() => { aviso.style.display = 'none'; }, 2500);
                }
            });
        });

        // Dynamic price update for toppings
        const toppingsCheckboxes = document.querySelectorAll('input[name="toppings"]');
        const priceDestaque = document.querySelector('.price-destaque');

        function getCalculatedPrice() {
            let total = 75.00;
            const checkedToppings = Array.from(document.querySelectorAll('input[name="toppings"]:checked')).map(cb => cb.value);
            if (checkedToppings.includes('oreo')) total += 3.00;
            if (checkedToppings.includes('mms')) total += 4.00;
            return total;
        }

        function updateIcebergPrice() {
            const total = getCalculatedPrice();
            priceDestaque.textContent = `R$ ${total.toFixed(2).replace('.', ',')}`;
        }

        toppingsCheckboxes.forEach(cb => {
            cb.addEventListener('change', updateIcebergPrice);
        });

        function getSelectedValues(name) {
            return Array.from(document.querySelectorAll(`input[name="${name}"]:checked`)).map(input => input.value);
        }

        function buildIcebergObservation(massa, sorvetes, toppings) {
            const lines = [
                `Massa: ${massa.replace('_', ' ')}`,
                `Sorvetes: ${sorvetes.map(s => s.replace('_', ' ')).join(', ')}`
            ];
            if (toppings.length) {
                lines.push(`Toppings: ${toppings.map(t => t.replace('-', ' ')).join(', ')}`);
            }
            return lines.join(' | ');
        }

        icebergForm.addEventListener('submit', function (event) {
            event.preventDefault();

            const massa = getSelectedValues('massa')[0];
            const sorvetes = getSelectedValues('sorvete');
            const toppings = getSelectedValues('toppings');

            if (!massa) {
                alert('Escolha a base da massa antes de adicionar ao carrinho.');
                return;
            }
            if (sorvetes.length === 0) {
                alert('Escolha pelo menos um sabor de sorvete.');
                return;
            }

            const calculatedPrice = getCalculatedPrice();

            const itemCarrinho = {
                sabor: 'monte_iceberg',
                titulo: 'Monte seu Iceberg',
                preco: `R$ ${calculatedPrice.toFixed(2).replace('.', ',')}`,
                imagem: defaultImage,
                quantidade: 1,
                observacao: buildIcebergObservation(massa, sorvetes, toppings)
            };

            const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
            const indexExistente = carrinho.findIndex(item => item.sabor === itemCarrinho.sabor && item.observacao === itemCarrinho.observacao);
            if (indexExistente > -1) {
                carrinho[indexExistente].quantidade += 1;
            } else {
                carrinho.push(itemCarrinho);
            }

            localStorage.setItem('carrinho', JSON.stringify(carrinho));
            localStorage.setItem('lastProductPage', 'monte_iceberg.html#monte-iceberg');
            window.location.href = 'carrinho.html';
        });
    </script>
</body>
</html>
