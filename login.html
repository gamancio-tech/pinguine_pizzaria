<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <title>Pinguine Pizzaria - Login</title>
</head>
<body>
    <main>
        <section class="login-page">
            <div class="login-card">
                <img src="images/logo.jpg" alt="Logo Pinguine" class="login-logo">
                <h1>Bem-vindo à Pinguine</h1>
                <p>Faça login para continuar e aproveitar nossos sabores especiais.</p>
                <form class="login-form" action="#" method="post">
                    <label for="email">E-mail</label>
                    <input type="email" id="email" name="email" placeholder="seu@email.com" required>

                    <label for="senha">Senha</label>
                    <input type="password" id="senha" name="senha" placeholder="Digite sua senha" required>

                    <button type="submit" class="btn-adicionar btn-grande">Entrar</button>
                    <div class="link-row">
                        <a href="#">Esqueci minha senha</a>
                        <a href="#">Criar conta</a>
                    </div>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
