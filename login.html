<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" href="images/logo.jpg" type="image/jpeg">
    <title>Pinguine Pizzaria - Login</title>
</head>
<body class="login-page-body">

    <!-- Italian Flag Checkered Side Strips -->
    <div class="checker-strip left"></div>
    <div class="checker-strip right"></div>

    <!-- Login Container Card -->
    <div class="login-container-card">
        <!-- Back Arrow -->
        <span class="login-btn-back" onclick="if(document.referrer) { window.history.back(); } else { window.location.href = 'main.html'; }">&larr;</span>

        <!-- Logo and Brand -->
        <img src="images/logo.jpg" alt="Logo Pinguine" class="logo logo-produto" style="margin: 0 0 0.5rem 0; width: 70px; height: 70px;">
        <h1 style="font-size: 1.5rem; color: #000; font-family: Arial, sans-serif; font-weight: 700; margin-bottom: 2rem; text-align: center;">Pinguine</h1>

        <!-- STATE 1: Login Form -->
        <form id="form-login" class="login-form active" action="#" onsubmit="handleLogin(event);">
            <input type="email" class="input-pill bg-green" placeholder="Insira seu email" required>
            <input type="password" class="input-pill bg-red" placeholder="Insira sua senha" required>
            <button type="submit" class="btn-pill bg-black">Entrar</button>
            
            <div class="login-footer-links">
                <a href="#" id="go-forgot" class="link-red">Esqueci minha senha!</a>
                <a href="#" id="go-register" class="link-red">Crie sua conta!</a>
            </div>
        </form>

        <!-- STATE 2: Register Form -->
        <form id="form-register" class="login-form" action="#" onsubmit="handleRegister(event);">
            <input type="email" class="input-pill bg-green" placeholder="Insira seu email" required>
            <input type="password" class="input-pill bg-red" placeholder="Insira sua senha" required>
            <input type="password" class="input-pill bg-red" placeholder="Confirmar senha" required>
            <button type="submit" class="btn-pill bg-black">Criar conta</button>
            
            <div class="login-footer-links justify-end">
                <a href="#" id="go-login-1" class="link-red">Entrar em sua conta!</a>
            </div>
        </form>

        <!-- STATE 3: Forgot Password Form -->
        <form id="form-forgot" class="login-form" action="#" onsubmit="event.preventDefault(); alert('Nova senha salva com sucesso!'); showForm('login');">
            <input type="email" class="input-pill bg-green" placeholder="Insira seu email" required>
            <input type="text" class="input-pill bg-red" placeholder="Inserir código de verificação" required>
            <input type="password" class="input-pill bg-red" placeholder="Insira sua nova senha" required>
            <input type="password" class="input-pill bg-red" placeholder="Copiar nova senha" required>
            <button type="submit" class="btn-pill bg-black">Salvar nova senha</button>
            
            <div class="login-footer-links justify-end">
                <a href="#" id="go-login-2" class="link-red">Entrar em sua conta!</a>
            </div>
        </form>
    </div>

    <!-- Toggle and Auth logic script -->
    <script>
        // Redirect if already logged in
        if (localStorage.getItem('userLoggedIn') === 'true') {
            window.location.href = 'perfil.html';
        }

        function showForm(formId) {
            document.querySelectorAll('.login-form').forEach(form => form.classList.remove('active'));
            const targetForm = document.getElementById('form-' + formId);
            if (targetForm) targetForm.classList.add('active');
        }

        function handleLogin(event) {
            event.preventDefault();
            const emailInput = document.querySelector('#form-login input[type="email"]');
            const email = emailInput.value.trim();

            // Check if a profile already exists for this email or create a default one
            const existingProfile = JSON.parse(localStorage.getItem('userProfile') || '{}');
            if (!existingProfile.email || existingProfile.email === email) {
                const profile = {
                    nome: existingProfile.nome || email.split('@')[0],
                    email: email,
                    telefone: existingProfile.telefone || '',
                    endereco: existingProfile.endereco || '',
                    complemento: existingProfile.complemento || '',
                    avatar: existingProfile.avatar || ''
                };
                localStorage.setItem('userProfile', JSON.stringify(profile));
                localStorage.setItem('userLoggedIn', 'true');
                window.location.href = 'main.html';
            } else {
                alert('Email não corresponde ao perfil salvo. Crie uma nova conta ou use o email correto.');
            }
        }

        function handleRegister(event) {
            event.preventDefault();
            const emailInput = document.querySelector('#form-register input[type="email"]');
            const senha1 = document.querySelectorAll('#form-register input[type="password"]')[0];
            const senha2 = document.querySelectorAll('#form-register input[type="password"]')[1];

            if (senha1.value !== senha2.value) {
                alert('As senhas não coincidem. Por favor, tente novamente.');
                return;
            }

            const email = emailInput.value.trim();
            const profile = {
                nome: email.split('@')[0],
                email: email,
                telefone: '',
                endereco: '',
                complemento: '',
                avatar: ''
            };
            localStorage.setItem('userProfile', JSON.stringify(profile));
            localStorage.setItem('userLoggedIn', 'true');
            window.location.href = 'main.html';
        }

        // Navigation links
        document.getElementById('go-forgot').addEventListener('click', (e) => { e.preventDefault(); showForm('forgot'); });
        document.getElementById('go-register').addEventListener('click', (e) => { e.preventDefault(); showForm('register'); });
        document.getElementById('go-login-1').addEventListener('click', (e) => { e.preventDefault(); showForm('login'); });
        document.getElementById('go-login-2').addEventListener('click', (e) => { e.preventDefault(); showForm('login'); });
    </script>
</body>
</html>
